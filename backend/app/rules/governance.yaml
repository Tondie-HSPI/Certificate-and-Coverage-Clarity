decision_framework:
  principle: "Deterministic business controls must remain separate from generative language reasoning."
  layers:
    llm_language_reasoning:
      purpose: "Summarization, explanation, drafting, interpretation, and tone adaptation."
      may_not:
        - approve coverage
        - certify compliance
        - perform final regulated decisions
        - override deterministic rules
    application_control:
      purpose: "Validation logic, routing, thresholds, refusal triggers, escalation handling, and state management."
    data_grounding:
      purpose: "Retrieved documents, structured knowledge, source excerpts, and evidence records."
    deterministic_tools:
      purpose: "Rule checks, calculations, schema validation, and comparison logic."
    human_review:
      purpose: "Final accountability for coverage, compliance, and carrier-facing decisions."

input_guardrails:
  allowed_roles:
    - contractor
    - broker
    - reviewer
    - admin
  allowed_document_types:
    - contract
    - coi
    - policy
    - supporting_doc
  max_documents: 10
  require_document_content: true
  out_of_scope_topics:
    - refund
    - investment advice
    - medical advice
    - legal representation
  injection_indicators:
    - ignore previous instructions
    - reveal the system prompt
    - developer message
    - tool call

thresholds:
  min_overall_confidence_for_auto_summary: 0.70
  min_source_grounding_for_met_state: true
  require_human_review_states:
    - missing
    - unmet
    - needs_review
    - unclear
  allowed_decision_states:
    - met
    - missing
    - unmet
    - needs_review
    - unclear

refusal_rules:
  insufficient_input: "Refuse if no usable documents are provided."
  invalid_role: "Refuse if the role is outside supported reviewer roles."
  unsupported_type: "Refuse if a document type is outside supported intake types."
  out_of_scope: "Refuse if the request appears unrelated to compliance document review."
  injection_attempt: "Refuse if the upload appears to contain prompt-injection instructions."
  weak_grounding: "Escalate if the output lacks source evidence for a decision state."
  invalid_state: "Escalate if the workflow generates a decision state outside the approved state machine."

output_validation:
  required_decision_fields:
    - obligation_type
    - requirement
    - state
    - search_terms
    - source
    - explanation
    - next_action
  prohibited_phrases:
    - legal advice
    - guaranteed compliant
    - always compliant
    - certifies compliance
    - approved
    - bound
    - coverage confirmed
    - no review needed
  fallback_next_action: "Escalate to reviewer for document confirmation."
  mandatory_review_note: "Human review required before carrier-facing use."
