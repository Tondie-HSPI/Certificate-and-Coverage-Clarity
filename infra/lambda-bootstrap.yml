AWSTemplateFormatVersion: "2010-09-09"
Description: Bootstrap resources for the Certificate and Coverage Clarity Lambda container.

Parameters:
  GitHubOwner:
    Type: String
    Default: Tondie-HSPI
  GitHubRepository:
    Type: String
    Default: Certificate-and-Coverage-Clarity

Resources:
  BackendRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: certificate-coverage-clarity-api
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep the ten most recent images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": {"type": "expire"}
              }
            ]
          }

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CoverageClarityLambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  GitHubDeploymentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GitHubActionsCoverageClarityLambdaDeploy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOwner}/${GitHubRepository}:*
      Policies:
        - PolicyName: PublishAndDeployCoverageClarity
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:CompleteLayerUpload
                  - ecr:GetDownloadUrlForLayer
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                  - ecr:UploadLayerPart
                Resource: !GetAtt BackendRepository.Arn
              - Effect: Allow
                Action:
                  - lambda:AddPermission
                  - lambda:CreateFunction
                  - lambda:CreateFunctionUrlConfig
                  - lambda:GetFunction
                  - lambda:GetFunctionUrlConfig
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                Resource: !Sub arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:certificate-coverage-clarity-api
              - Effect: Allow
                Action: iam:PassRole
                Resource: !GetAtt LambdaExecutionRole.Arn

Outputs:
  EcrRepositoryUri:
    Value: !GetAtt BackendRepository.RepositoryUri
  GitHubDeploymentRoleArn:
    Value: !GetAtt GitHubDeploymentRole.Arn
  LambdaExecutionRoleArn:
    Value: !GetAtt LambdaExecutionRole.Arn
