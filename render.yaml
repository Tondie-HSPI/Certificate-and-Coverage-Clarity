services:
  - type: web
    name: certificate-coverage-clarity-api
    runtime: docker
    plan: free
    region: ohio
    branch: main
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: COVERAGE_CLARITY_APP_NAME
        value: Certificate & Coverage Clarity API
      - key: COVERAGE_CLARITY_APP_ENV
        value: production
      - key: COVERAGE_CLARITY_CORS_ALLOW_ORIGINS
        value: '["https://main.d2cm8nx2fbbm4a.amplifyapp.com"]'
